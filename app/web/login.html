<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BIT 登录 - 北理新生助手</title>
  <link rel="stylesheet" href="/theme.css" />
</head>
<body>
  <main class="shell login-shell">
    <section class="hero page-hero">
      <div class="chips">
        <span class="chip">BIT 统一身份认证</span>
        <span class="chip">登录后方可使用</span>
      </div>
      <h1>北理新生助手</h1>
      <p>请输入统一身份认证账号和密码，完成登录后即可进入校园服务页面。</p>
    </section>

    <section class="panel login-panel">
      <div class="login-panel-head">
        <h2>BIT 统一身份认证</h2>
        <div class="muted">未登录时，地点查询、智能问答、人工工单和学长处理台都不可用。</div>
      </div>

      <div class="field-stack">
        <div>
          <label for="username">账号</label>
          <input id="username" type="text" autocomplete="username" placeholder="例如：学号/工号" />
        </div>

        <div>
          <label for="password">密码</label>
          <input id="password" type="password" autocomplete="current-password" placeholder="请输入密码" />
        </div>
      </div>

      <button id="loginBtn" type="button">登录系统</button>
      <div id="status" class="status"></div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const nextUrl = params.get('next') || '/';

    function setStatus(text, isError = false) {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = isError ? 'status error' : 'status';
    }

    async function submitLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) {
        setStatus('请输入账号和密码。', true);
        return;
      }

      setStatus('登录中...');
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, next: nextUrl }),
        });
        const data = await res.json();
        if (!res.ok || !data.ok) {
          setStatus(data.error || '登录失败', true);
          return;
        }
        window.location.href = data.next || '/';
      } catch (err) {
        setStatus('网络异常，请稍后重试。', true);
      }
    }

    document.getElementById('loginBtn').addEventListener('click', submitLogin);
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        submitLogin();
      }
    });
  </script>
</body>
</html>
