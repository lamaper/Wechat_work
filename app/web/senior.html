<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>学长处理台 - 人工工单</title>
  <link rel="stylesheet" href="/theme.css" />
</head>
<body class="senior-page">
  <main class="wrap">
    <section class="panel dashboard-head">
      <h1>学长处理台</h1>
      <div class="muted">这里集中显示待回复与已回复的问题，具备答复权限的账号可直接处理。</div>
      <div class="row ops-toolbar">
        <div class="ops-identity">
          <span class="muted">当前账号</span>
          <span id="me" class="count">加载中</span>
        </div>
        <div class="ops-search">
          <input id="searchInput" class="search-field" type="text" placeholder="搜索编号、问题关键词或查询码" />
          <button id="searchBtn" class="btn secondary" type="button">开始搜索</button>
        </div>
        <div class="ops-actions">
          <button id="refreshBtn" class="btn" type="button">刷新列表</button>
          <a class="btn secondary" href="/logout">退出登录</a>
          <a class="btn secondary" href="/">返回首页</a>
        </div>
      </div>
      <div id="status" class="section-status"></div>
    </section>

    <section class="board senior-board">
      <section class="panel">
        <div class="sub">
          <h3>待回复问题</h3>
          <span id="pendingCount" class="count">0</span>
        </div>
        <div id="pendingList" class="list"></div>
      </section>

      <section class="panel">
        <div class="sub">
          <h3>已回复记录</h3>
          <span id="answeredCount" class="count">0</span>
        </div>
        <div id="answeredList" class="list"></div>
      </section>
    </section>
  </main>

  <script src="/common.js"></script>
  <script>
    let currentQuery = '';

    const esc = window.AppCommon.escapeHtml;

    function getSearchQuery() {
      return (document.getElementById('searchInput').value || '').trim();
    }

    const fmtTs = window.AppCommon.formatUnixTimestamp;

    function pendingCard(item) {
      return `
        <article class="item">
          <div class="head">
            <div class="qid">#${item.id} ${esc(item.title || '未命名问题')}</div>
            <div class="muted">${esc(item.channel || '-')} · 查询码 ${esc(item.view_code || '-')}</div>
          </div>
          <div class="item-content">${esc(item.content || '')}</div>
          <div class="note">提问人: ${esc(item.from_user_display || '已认证用户')} · 提交时间: ${esc(fmtTs(item.created_at))}</div>
          <textarea class="answer-input" rows="5" placeholder="请输入本次回复内容" data-answer-for="${item.id}"></textarea>
          <div class="row">
            <button class="btn" data-submit-for="${item.id}" type="button">提交回复</button>
          </div>
        </article>
      `;
    }

    function answeredCard(item) {
      const statusText = item.status === 'closed' ? '已结束' : '已回复';
      return `
        <article class="item">
          <div class="head">
            <div class="qid">#${item.id} ${esc(item.title || '未命名问题')}</div>
            <div class="muted">${esc(statusText)} · ${esc(item.channel || '-')} · 查询码 ${esc(item.view_code || '-')}</div>
          </div>
          <div class="item-content">${esc(item.content || '')}</div>
          <div class="answer">${esc(item.answer || '')}</div>
          <div class="note">提问人: ${esc(item.from_user_display || '已认证用户')} · 回复人: ${esc(item.answerer_display || item.answerer_nickname || '-')} · 回复时间: ${esc(fmtTs(item.answered_at))}</div>
        </article>
      `;
    }

    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }

    async function loadPending() {
      const listEl = document.getElementById('pendingList');
      const countEl = document.getElementById('pendingCount');

      listEl.innerHTML = '';
      try {
        const res = await fetch(`/api/tasks/pending?q=${encodeURIComponent(currentQuery)}`);
        const data = await res.json();
        if (!res.ok) {
          if (res.status === 403) {
            listEl.innerHTML = '<div class="muted">当前账号暂无处理权限。</div>';
            countEl.textContent = '-';
            return { ok: false, denied: true };
          }
          setStatus(data.error || '加载失败');
          countEl.textContent = '0';
          return { ok: false };
        }

        const items = data.items || [];
        countEl.textContent = `${items.length}`;
        if (!items.length) {
          listEl.innerHTML = '<div class="muted">当前没有待回复问题。</div>';
          return { ok: true };
        }
        listEl.innerHTML = items.map(pendingCard).join('');
        return { ok: true };
      } catch (err) {
        setStatus('网络异常，请稍后再试。');
        countEl.textContent = '0';
        return { ok: false };
      }
    }

    async function loadAnswered() {
      const listEl = document.getElementById('answeredList');
      const countEl = document.getElementById('answeredCount');

      listEl.innerHTML = '';
      try {
        const res = await fetch(`/api/tasks/answered?q=${encodeURIComponent(currentQuery)}`);
        const data = await res.json();
        if (!res.ok) {
          if (res.status === 403) {
            listEl.innerHTML = '<div class="muted">当前账号暂无处理权限。</div>';
            countEl.textContent = '-';
            return { ok: false, denied: true };
          }
          countEl.textContent = '0';
          return { ok: false };
        }

        const items = data.items || [];
        countEl.textContent = `${items.length}`;
        if (!items.length) {
          listEl.innerHTML = '<div class="muted">当前没有已回复记录。</div>';
          return { ok: true };
        }
        listEl.innerHTML = items.map(answeredCard).join('');
        return { ok: true };
      } catch (err) {
        countEl.textContent = '0';
        return { ok: false };
      }
    }

    async function loadAll() {
      setStatus(`正在加载问题${currentQuery ? `：${currentQuery}` : ''}`);
      const [pendingState, answeredState] = await Promise.all([loadPending(), loadAnswered()]);

      if (pendingState?.denied || answeredState?.denied) {
        setStatus('当前账号暂无处理权限，可联系管理员开通后再处理问题。');
        return;
      }

      if (!pendingState?.ok || !answeredState?.ok) {
        setStatus('列表刷新失败，请稍后再试。');
        return;
      }

      setStatus(`列表已更新${currentQuery ? `，当前筛选：${currentQuery}` : ''}`);
    }

    async function submitAnswer(questionId) {
      const ta = document.querySelector(`textarea[data-answer-for="${questionId}"]`);
      const content = ta ? ta.value.trim() : '';

      if (!content) {
        setStatus('请先填写回复内容，再提交。');
        return;
      }

      setStatus(`正在提交 #${questionId} 的回复...`);
      try {
        const res = await fetch('/api/answers', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ question_id: Number(questionId), content }),
        });
        const data = await res.json();
        if (!res.ok) {
          setStatus(data.error || '提交失败');
          return;
        }

        setStatus(`#${questionId} 已提交回复`);
        await loadAll();
      } catch (err) {
        setStatus('提交失败，请稍后重试。');
      }
    }

    function doSearch() {
      currentQuery = getSearchQuery();
      loadAll();
    }

    function bindEvents() {
      document.getElementById('refreshBtn').addEventListener('click', () => {
        currentQuery = '';
        document.getElementById('searchInput').value = '';
        loadAll();
      });
      document.getElementById('searchBtn').addEventListener('click', doSearch);
      document.getElementById('searchInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          doSearch();
        }
      });
      document.getElementById('pendingList').addEventListener('click', (e) => {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        const qid = target.getAttribute('data-submit-for');
        if (!qid) return;
        submitAnswer(Number(qid));
      });
    }

    async function loadMe() {
      try {
        const res = await fetch('/api/auth/me');
        const data = await res.json();
        if (!res.ok) {
          document.getElementById('me').textContent = '未登录';
          return;
        }
        const user = data.user || {};
        const name = user.name || user.student_code || '已登录';
        const labels = Array.isArray(user.permission_labels) ? user.permission_labels.join(', ') : '';
        document.getElementById('me').textContent = labels ? `${name} · ${labels}` : name;
      } catch (err) {
        document.getElementById('me').textContent = '加载失败';
      }
    }

    (function init() {
      bindEvents();
      loadMe();
      loadAll();
    })();
  </script>
</body>
</html>
