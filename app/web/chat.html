<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新生智能问答助手</title>
  <link rel="stylesheet" href="/theme.css" />
</head>
<body class="chat-page">
  <div class="backdrop one"></div>
  <div class="backdrop two"></div>
  <div class="backdrop three"></div>

  <main class="app-shell">
    <aside class="rail">
      <section class="hero-card">
        <p class="eyebrow">智能问答</p>
        <h1>北理新生助手</h1>
        <p class="hero-copy">报到、住宿、选课和校园生活问题，都可以直接从这里开始提问。</p>
        <div class="badge-row">
          <span id="modeBadge" class="status-pill is-idle">准备就绪</span>
        </div>
      </section>

      <section class="panel quick-panel">
        <div class="panel-head">
          <h2>常见问题</h2>
        </div>
        <div class="prompt-grid">
          <button class="prompt-chip" type="button" data-prompt="北理工奖学金主要类型和申请建议有哪些？">奖学金申请</button>
          <button class="prompt-chip" type="button" data-prompt="报到当天需要准备哪些材料？">报到材料</button>
          <button class="prompt-chip" type="button" data-prompt="宿舍和校园网开通流程是什么？">宿舍与校园网</button>
          <button class="prompt-chip" type="button" data-prompt="研究生院有哪些新生相关通知入口？">研究生通知入口</button>
        </div>
      </section>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div>
          <h2 class="topbar-title">智能问答</h2>
          <p class="topbar-copy">直接提问，或先从左侧常见问题开始。</p>
        </div>
        <nav class="topbar-nav">
          <a class="top-link" href="/">返回主页</a>
          <a class="top-link" href="/place">地图查询</a>
          <a class="top-link" href="/freshman">我的问题</a>
          <a class="top-link" href="/logout">退出登录</a>
        </nav>
      </header>

      <section class="conversation">
        <section class="messages-panel chat-messages-panel">
          <div class="panel-head">
            <div>
              <h2>本轮回答</h2>
              <p id="strategyNote" class="topbar-copy">回答会结合可用信息整理成完整回复。</p>
            </div>
            <span id="statusPill" class="status-pill is-idle">可开始</span>
          </div>
          <section id="messages" class="messages">
            <div id="emptyState" class="empty-state">
              <h3>发出问题后，这里会显示本轮回答。</h3>
              <p>如果回答引用了网页或来源链接，也会一并保留。</p>
            </div>
          </section>
        </section>
      </section>

      <section class="composer-shell">
        <div class="composer-card chat-composer">
          <label class="field-label" for="input">你的问题</label>
          <textarea id="input" placeholder="例如：北京理工大学奖学金申请条件有哪些？Enter 发送，Shift+Enter 换行。"></textarea>
          <div class="composer-actions">
            <span class="hint">可直接继续追问；回答中会保留引用到的链接。</span>
            <button id="sendBtn" class="send-btn" type="button">发送问题</button>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="/common.js"></script>
  <script>
    const messagesEl = document.getElementById('messages');
    const emptyStateEl = document.getElementById('emptyState');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const modeBadgeEl = document.getElementById('modeBadge');
    const statusPillEl = document.getElementById('statusPill');
    const strategyNoteEl = document.getElementById('strategyNote');

    const escapeHtml = window.AppCommon.escapeHtml;

    function formatTime(date = new Date()) {
      return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    }

    function renderInlineMarkdown(raw) {
      let html = escapeHtml(raw);
      html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');
      html = html.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
      html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
      return html;
    }

    function renderMarkdown(text) {
      const normalized = String(text || '').replace(/\r\n/g, '\n');
      const lines = normalized.split('\n');
      const htmlParts = [];
      let inCodeBlock = false;
      let inUl = false;
      let inOl = false;

      function closeLists() {
        if (inUl) {
          htmlParts.push('</ul>');
          inUl = false;
        }
        if (inOl) {
          htmlParts.push('</ol>');
          inOl = false;
        }
      }

      for (const line of lines) {
        const trimmed = line.trim();

        if (/^```/.test(trimmed)) {
          closeLists();
          if (!inCodeBlock) {
            htmlParts.push('<pre><code>');
            inCodeBlock = true;
          } else {
            htmlParts.push('</code></pre>');
            inCodeBlock = false;
          }
          continue;
        }

        if (inCodeBlock) {
          htmlParts.push(`${escapeHtml(line)}\n`);
          continue;
        }

        if (!trimmed) {
          closeLists();
          continue;
        }

        const headingMatch = trimmed.match(/^(#{1,4})\s+(.+)$/);
        if (headingMatch) {
          closeLists();
          const level = headingMatch[1].length;
          htmlParts.push(`<h${level}>${renderInlineMarkdown(headingMatch[2])}</h${level}>`);
          continue;
        }

        const quoteMatch = trimmed.match(/^>\s?(.+)$/);
        if (quoteMatch) {
          closeLists();
          htmlParts.push(`<blockquote>${renderInlineMarkdown(quoteMatch[1])}</blockquote>`);
          continue;
        }

        const ulMatch = trimmed.match(/^[-*]\s+(.+)$/);
        if (ulMatch) {
          if (inOl) {
            htmlParts.push('</ol>');
            inOl = false;
          }
          if (!inUl) {
            htmlParts.push('<ul>');
            inUl = true;
          }
          htmlParts.push(`<li>${renderInlineMarkdown(ulMatch[1])}</li>`);
          continue;
        }

        const olMatch = trimmed.match(/^\d+\.\s+(.+)$/);
        if (olMatch) {
          if (inUl) {
            htmlParts.push('</ul>');
            inUl = false;
          }
          if (!inOl) {
            htmlParts.push('<ol>');
            inOl = true;
          }
          htmlParts.push(`<li>${renderInlineMarkdown(olMatch[1])}</li>`);
          continue;
        }

        closeLists();
        htmlParts.push(`<p>${renderInlineMarkdown(trimmed)}</p>`);
      }

      closeLists();
      if (inCodeBlock) {
        htmlParts.push('</code></pre>');
      }
      return htmlParts.join('');
    }

    function hideEmptyState() {
      if (emptyStateEl) {
        emptyStateEl.style.display = 'none';
      }
    }

    function scrollMessagesToBottom() {
      requestAnimationFrame(() => {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      });
    }

    function setStatus(kind, note) {
      const map = {
        idle: { badge: '准备就绪', pill: '可开始', className: 'is-idle' },
        loading: { badge: '正在整理', pill: '处理中', className: 'is-active' },
        web: { badge: '回答已生成', pill: '已完成', className: 'is-active' },
        kb: { badge: '回答已生成', pill: '已完成', className: 'is-idle' },
        error: { badge: '本轮失败', pill: '请重试', className: 'is-warn' }
      };
      const state = map[kind] || map.idle;
      modeBadgeEl.textContent = state.badge;
      modeBadgeEl.className = `status-pill ${state.className}`;
      statusPillEl.textContent = state.pill;
      statusPillEl.className = `status-pill ${state.className}`;
      strategyNoteEl.textContent = note || '回答会结合可用信息整理成完整回复。';
    }

    function addMessage(role, text) {
      hideEmptyState();
      const article = document.createElement('article');
      article.className = `msg ${role}`;

      const label = role === 'user' ? '你的问题' : '助手回答';
      const avatar = role === 'user' ? '我' : 'AI';
      article.innerHTML = `
        <div class="msg-meta">
          <span class="avatar">${avatar}</span>
          <div class="msg-meta-copy">
            <strong>${label}</strong>
            <span>${formatTime()}</span>
          </div>
        </div>
        <div class="msg-body"></div>
      `;
      setMessageContent(article, role, text);
      messagesEl.appendChild(article);
      scrollMessagesToBottom();
      return article;
    }

    function setMessageContent(el, role, text) {
      const body = el.querySelector('.msg-body');
      if (!body) {
        return;
      }
      if (role === 'bot') {
        body.innerHTML = renderMarkdown(text);
      } else {
        body.textContent = text;
      }
      scrollMessagesToBottom();
    }

    function setLoadingState(loading) {
      sendBtn.disabled = loading;
      sendBtn.textContent = loading ? '处理中...' : '发送问题';
    }

    async function sendMessage() {
      const question = inputEl.value.trim();
      if (!question) return;

      addMessage('user', question);
      inputEl.value = '';
      inputEl.style.height = '';
      setLoadingState(true);
      setStatus('loading', '正在整理回答，请稍候。');

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });

        if (!res.ok) {
          throw new Error('请求失败');
        }

        const data = await res.json();
        setStatus(
          data.mode === 'kb' ? 'kb' : 'web',
          '已整理完成，可继续追问。'
        );
        addMessage('bot', data.answer || '抱歉，暂时无法回答这个问题。');
      } catch (err) {
        setStatus('error', '本轮请求失败，请稍后再试。');
        addMessage('bot', '网络异常，请稍后再试。');
      } finally {
        setLoadingState(false);
      }
    }

    sendBtn.addEventListener('click', sendMessage);

    inputEl.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = `${Math.min(inputEl.scrollHeight, 220)}px`;
    });

    document.querySelectorAll('.prompt-chip').forEach((button) => {
      button.addEventListener('click', () => {
        inputEl.value = button.dataset.prompt || '';
        inputEl.dispatchEvent(new Event('input'));
        inputEl.focus();
      });
    });

    setStatus('idle', '回答会结合可用信息整理成完整回复。');
  </script>
</body>
</html>
